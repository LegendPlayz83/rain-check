<!DOCTYPE html>
<html>
    <head>
    <title>Rain Check</title>
    <link rel="preconnected" href="https://fonts.googleapis.com">
    <link rel="preconnected" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href=""style.css">
    </head>

    <div class="background">
        <div class="gradient"></div>

        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>

        <div class="rain-container">
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>

            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="drop"></span>

        </div>
    </div>

<main class="container">

    <section class="hero">

        <h1>Rain Check</h1>

        <p class="tagline">
            Before you step out.
        </p>
    </section>

    <section class="search-section">

        <div class="search-box">

            <input
            type="text"
            id="locationInput"
            placeholder="Enter your city..."
            autocomplete="off"

            <button id="searchBtn"

            Search

        </button>
        </div>
    </section>

    <section class="weather-card">
        <div class="weather-top">
            <div class="weather-icon">
                🌧️
            </div>

            <div class="weather-main">

                <h2 id="cityName">

                    Your City
                </h2>

                <p id="weatherStatus">
                    Waiting for search...
                </p>

            </div>
        </div>

        <div class="divider"></div>

        <div class="result-section">

            <div class="rain-answer">

                <h3>
                    Will it rain today?
                </h3>

                <p id="rainResult">
                    --
                </p>
            </div>
        </div>
        <div class="weather-details">

            <div class="detail-card">

                <span class="detail-title">
                    Temperature
                </span>
                <span
                class="detail-value"
                id="temperature">
                --
            </span>
            </div>

            <div class="detail-card">

                <span class="detail-title">
                    Humidity
                </span>

                <span
                class="detail-value"
                id="humidity">
                --
            </span>
            </div>

            <div class="detail-card">

                <span class="detail-title">
                    Rain Chance
                </span>

                <span
                class="detail-value"
                id="chance">
                --
            </span>
            </div>

            <div class="detail-card">

                <span class="detail-title">
                    Wind
                </span>

                <span
                class="detail-value"
                id="wind">
                --
            </span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="recommendation">

            <h3>
                Recommendation
            </h3>
            <p id="advice">
                Search a city to receive today's weather advice.
            </p>
        </div>
    </section>
